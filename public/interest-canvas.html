<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entropyzero · Interest Web</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; }
    body { background:#050505; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#e8e8e8; display:flex; flex-direction:column; height:100vh; }
    .header { padding:14px 18px 10px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; border-bottom:1px solid #111; }
    .brand { display:flex; align-items:center; gap:7px; }
    .brand-dot { width:6px; height:6px; border-radius:50%; background:#a78bfa; box-shadow:0 0 6px #a78bfa88; }
    .brand-name { font-size:11px; color:#555; font-weight:700; letter-spacing:.04em; text-transform:lowercase; }
    .meta { font-size:9px; color:#333; font-family:monospace; letter-spacing:.05em; }
    .canvas-wrap { flex:1; position:relative; overflow:hidden; }
    canvas { position:absolute; inset:0; width:100%; height:100%; cursor:grab; touch-action:none; }
    canvas.dragging { cursor:grabbing; }
    .footer { padding:8px 18px; border-top:1px solid #0d0d0d; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .footer-left { font-size:9px; color:#2a2a2a; font-family:monospace; }
    .footer-link { font-size:9px; color:#333; text-decoration:none; border:1px solid #171717; border-radius:5px; padding:3px 7px; transition:all .15s; }
    .footer-link:hover { color:#999; border-color:#333; }
    .state { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; text-align:center; padding:40px; }
    .state-icon { font-size:26px; opacity:0.25; }
    .state-title { color:#444; font-size:12px; font-weight:600; }
    .state-detail { color:#2a2a2a; font-size:9px; font-family:monospace; max-width:280px; line-height:1.5; }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-dot"></div>
    <span class="brand-name">entropyzero</span>
  </div>
  <span class="meta" id="meta">interest web</span>
</div>

<div class="canvas-wrap" id="wrap">
  <div class="state" id="state">
    <div class="state-icon">🕸️</div>
    <div class="state-title">Loading…</div>
  </div>
  <canvas id="canvas" style="display:none"></canvas>
</div>

<div class="footer">
  <span class="footer-left" id="footer-left">—</span>
  <a class="footer-link" href="https://entropyzero.vercel.app" target="_blank">full index →</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBuPTw6WpRTWSDhs_L_W9OELFP6ff6Ki0c",
  authDomain:"copiumai-9f5b6.firebaseapp.com",
  projectId:"copiumai-9f5b6",
  storageBucket:"copiumai-9f5b6.firebasestorage.app",
  messagingSenderId:"164793994267",
  appId:"1:164793994267:web:f9d3594cca736c7fa67cbe"
}));

const uid      = new URLSearchParams(window.location.search).get("uid");
const stateEl  = document.getElementById("state");
const canvas   = document.getElementById("canvas");
const metaEl   = document.getElementById("meta");
const footerL  = document.getElementById("footer-left");
const wrap     = document.getElementById("wrap");

function showErr(icon, title, detail) {
  stateEl.innerHTML = `<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-detail">${detail}</div>`;
}

if (!uid) { showErr("🔗","No user ID","Add ?uid=YOUR_USER_ID to the URL"); }
else {
  getDoc(doc(db,"public",uid)).then(snap => {
    if (!snap.exists()) return showErr("🔒","Not shared","This user hasn't enabled their interest web.");
    const d = snap.data();
    if (!d.interestTopics?.length || d.interestTopics.length < 2)
      return showErr("🕸️","No interests yet","Add YouTube videos in the Interests tab first.");
    // Edges stored as [{a,b}] maps (Firestore doesn't support nested arrays)
    const rawEdges = d.interestEdges || [];
    const edges = rawEdges.map(e => Array.isArray(e) ? e : [e.a, e.b]).filter(e => e[0] && e[1]);
    render(d.interestTopics, edges, d.interestName||"");
  }).catch(e => {
    const perm = e.code==="permission-denied"||(e.message||"").includes("permission");
    showErr(perm?"🛡️":"⚠️", perm?"Permission denied":"Load failed",
      perm ? "Set Firestore rule:\nmatch /public/{userId} { allow read: if true; }" : e.message);
  });
}

const COLORS = ['#60a5fa','#f97316','#a78bfa','#34d399','#f472b6','#facc15','#38bdf8','#fb923c','#4ade80','#e879f9','#fbbf24','#22d3ee','#f87171','#86efac','#c084fc'];

function render(topics, edges, name) {
  stateEl.style.display = "none";
  canvas.style.display  = "block";
  metaEl.textContent    = `${topics.length} topics`;
  footerL.textContent   = name ? `${name} · ${topics.length} topics` : `${topics.length} topics`;

  const dpr = window.devicePixelRatio || 1;
  let W = wrap.offsetWidth, H = wrap.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  const freq = {};
  topics.forEach(t => { freq[t] = Math.max(1, edges.filter(e => e[0]===t||e[1]===t).length); });

  // init nodes in spiral
  const nodes = topics.map((t, i) => {
    const a = i * 2.399, r = 55 + (i%4)*38 + Math.floor(i/4)*16;
    return {
      id:t, color:COLORS[i%COLORS.length],
      r: 5 + (freq[t]||1)*2.6,
      x: W/2+r*Math.cos(a)+(Math.random()-.5)*14,
      y: H/2+r*Math.sin(a)+(Math.random()-.5)*14,
      vx:(Math.random()-.5)*1.0, vy:(Math.random()-.5)*1.0,
    };
  });

  const sim = { nodes, drag:null, clicked:null, frame:0 };
  const MARGIN=18, rest=Math.min(W,H)*0.30;

  const tick = () => {
    sim.frame++;
    const f = sim.frame;
    const nm = {};
    nodes.forEach(n => { nm[n.id]=n; });

    nodes.forEach(n => {
      if (sim.drag?.node===n) return;
      n.vx += (W/2-n.x)*0.0009;
      n.vy += (H/2-n.y)*0.0009;
      n.vx += (Math.random()-.5)*0.04;
      n.vy += (Math.random()-.5)*0.04;
    });

    for (let i=0;i<nodes.length;i++) {
      for (let j=i+1;j<nodes.length;j++) {
        const a=nodes[i],b=nodes[j];
        if(sim.drag?.node===a||sim.drag?.node===b) continue;
        const dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||.01,d=Math.sqrt(d2);
        const fo=Math.min(1100,2000/d2),fx=dx/d*fo,fy=dy/d*fo;
        a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
      }
    }

    edges.forEach(([ta,tb]) => {
      const a=nm[ta],b=nm[tb];
      if(!a||!b||sim.drag?.node===a||sim.drag?.node===b) return;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const fo=(d-rest)*.026,fx=dx/d*fo,fy=dy/d*fo;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
    });

    nodes.forEach(n => {
      if(sim.drag?.node===n) return;
      n.vx*=.88; n.vy*=.88;
      const spd=Math.sqrt(n.vx*n.vx+n.vy*n.vy);
      if(spd>3.5){n.vx=n.vx/spd*3.5;n.vy=n.vy/spd*3.5;}
      n.x=Math.max(n.r+MARGIN,Math.min(W-n.r-MARGIN,n.x+n.vx));
      n.y=Math.max(n.r+MARGIN,Math.min(H-n.r-MARGIN,n.y+n.vy));
      if(n.x<=n.r+MARGIN||n.x>=W-n.r-MARGIN) n.vx*=-.6;
      if(n.y<=n.r+MARGIN||n.y>=H-n.r-MARGIN) n.vy*=-.6;
    });

    ctx.clearRect(0,0,W,H);

    const pulse=0.09+0.07*Math.sin(f*.033);
    edges.forEach(([ta,tb]) => {
      const a=nm[ta],b=nm[tb];
      if(!a||!b) return;
      const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      g.addColorStop(0,a.color+'2e'); g.addColorStop(1,b.color+'2e');
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=g; ctx.lineWidth=.65+pulse; ctx.stroke();
    });

    const now=Date.now();
    nodes.forEach(n => {
      const isDrag=sim.drag?.node===n;
      const age=sim.clicked?.node===n?now-sim.clicked.at:Infinity;
      const glowR=n.r*(isDrag?5.5:age<800?2.5+3.5*Math.max(0,1-age/800):2.8);
      const alpha=isDrag?'60':age<800?'bb':'28';
      const grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,glowR);
      grd.addColorStop(0,n.color+alpha); grd.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(n.x,n.y,glowR,0,Math.PI*2);
      ctx.fillStyle=grd; ctx.fill();

      ctx.beginPath(); ctx.arc(n.x,n.y,n.r*(isDrag?1.3:1),0,Math.PI*2);
      ctx.fillStyle=n.color; ctx.fill();

      ctx.font='500 9.5px -apple-system,BlinkMacSystemFont,sans-serif';
      const tw=ctx.measureText(n.id).width;
      const lx=(n.x+n.r+5+tw>W-4)?n.x-n.r-6-tw:n.x+n.r+5;
      const ly=n.y+3.5;
      ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillText(n.id,lx+.6,ly+.6);
      ctx.fillStyle=isDrag||age<600?'#fff':'#bbb'; ctx.fillText(n.id,lx,ly);
    });

    requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);

  // pointer events
  const hitTest=(cx,cy)=>{
    let best=null,bestD=Infinity;
    nodes.forEach(n=>{
      const d=Math.hypot(n.x-cx/dpr,n.y-cy/dpr);
      if(d<Math.max(n.r*2.5,18)&&d<bestD){best=n;bestD=d;}
    });
    return best;
  };
  const xy=e=>{
    const r=canvas.getBoundingClientRect(),s=e.touches?.[0]||e;
    return[(s.clientX-r.left)*dpr,(s.clientY-r.top)*dpr];
  };
  const onDown=e=>{
    e.preventDefault();
    const[cx,cy]=xy(e);
    const node=hitTest(cx,cy);
    if(!node) return;
    sim.drag={node,offX:node.x-cx/dpr,offY:node.y-cy/dpr};
    sim.clicked={node,at:Date.now()};
    node.vx=0;node.vy=0;
    canvas.classList.add('dragging');
  };
  const onMove=e=>{
    e.preventDefault();
    if(!sim.drag) return;
    const[cx,cy]=xy(e);
    sim.drag.node.x=Math.max(sim.drag.node.r+MARGIN,Math.min(W-sim.drag.node.r-MARGIN,cx/dpr+sim.drag.offX));
    sim.drag.node.y=Math.max(sim.drag.node.r+MARGIN,Math.min(H-sim.drag.node.r-MARGIN,cy/dpr+sim.drag.offY));
    sim.drag.node.vx=0;sim.drag.node.vy=0;
  };
  const onUp=()=>{
    if(sim.drag){sim.drag.node.vx=(Math.random()-.5)*1.2;sim.drag.node.vy=(Math.random()-.5)*1.2;sim.drag=null;}
    canvas.classList.remove('dragging');
  };
  canvas.addEventListener('mousedown', onDown,{passive:false});
  canvas.addEventListener('mousemove', onMove,{passive:false});
  canvas.addEventListener('mouseup',   onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onDown,{passive:false});
  canvas.addEventListener('touchmove', onMove,{passive:false});
  canvas.addEventListener('touchend',  onUp);
}
</script>
</body>
</html>
