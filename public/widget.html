<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entropyzero widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8e8e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .widget { width: 100%; max-width: 500px; background: #141414; border: 1px solid #2a2a2a; border-radius: 20px; padding: 20px; margin: 16px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .name { font-size: 14px; font-weight: 600; color: #e8e8e8; }
    .ticker { font-family: monospace; font-size: 11px; color: #555; margin-top: 2px; }
    .price { font-size: 22px; font-weight: 700; font-family: monospace; }
    .change { font-size: 11px; font-family: monospace; margin-top: 2px; }
    .pos { color: #22c55e; } .neg { color: #ef4444; }
    .ranges { display: flex; gap: 4px; margin-bottom: 10px; }
    .range-btn { flex: 1; padding: 5px 0; font-size: 10px; font-weight: 600; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #555; cursor: pointer; transition: all 0.15s; font-family: monospace; }
    .range-btn:hover { color: #aaa; border-color: #444; }
    .range-btn.active { background: #e8e8e8; color: #0d0d0d; border-color: #e8e8e8; }
    .chart-area { width: 100%; height: 175px; margin-bottom: 14px; position: relative; }
    .chart-area svg { width: 100%; height: 100%; display: block; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 10px; text-align: center; }
    .stat-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-size: 13px; font-weight: 600; font-family: monospace; }
    .footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1e1e1e; padding-top: 12px; }
    .brand { font-size: 10px; color: #444; display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .cta { font-size: 10px; color: #555; text-decoration: none; border: 1px solid #2a2a2a; border-radius: 8px; padding: 4px 10px; transition: all 0.2s; }
    .cta:hover { color: #e8e8e8; border-color: #444; }
    .center { text-align: center; padding: 40px 20px; color: #555; font-size: 12px; line-height: 2; }
    .center .icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
    .center .title { color: #777; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .center .detail { color: #444; font-size: 10px; font-family: monospace; }
    .tip { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px 14px; margin-top: 12px; text-align: left; font-size: 10px; color: #555; line-height: 1.8; }
    .tip code { color: #666; background: #1a1a1a; padding: 1px 5px; border-radius: 4px; }
    .tooltip { position: absolute; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 6px 10px; font-size: 11px; pointer-events: none; display: none; white-space: nowrap; z-index: 10; transform: translate(-50%, -110%); }
  </style>
</head>
<body>
<div class="widget" id="app">
  <div class="center">
    <div class="icon">📈</div>
    <div class="title">Loading…</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const db = getFirestore(initializeApp({
    apiKey: "AIzaSyBuPTw6WpRTWSDhs_L_W9OELFP6ff6Ki0c",
    authDomain: "copiumai-9f5b6.firebaseapp.com",
    projectId: "copiumai-9f5b6",
    storageBucket: "copiumai-9f5b6.firebasestorage.app",
    messagingSenderId: "164793994267",
    appId: "1:164793994267:web:f9d3594cca736c7fa67cbe"
  }));

  const uid = new URLSearchParams(window.location.search).get("uid");
  const app = document.getElementById("app");
  const fmt = (n, d=2) => parseFloat(n).toFixed(d);

  function show(html) { app.innerHTML = html; }

  if (!uid) {
    show(`<div class="center">
      <div class="icon">🔗</div>
      <div class="title">No user ID</div>
      <div class="detail">Add ?uid=YOUR_USER_ID to this URL</div>
    </div>`);
  } else {
    getDoc(doc(db, "public", uid))
      .then(snap => {
        if (!snap.exists()) {
          show(`<div class="center">
            <div class="icon">🔒</div>
            <div class="title">Widget not enabled</div>
            <div class="detail">uid: ${uid.slice(0,8)}…</div>
            <div class="tip">
              Go to <strong style="color:#888">entropyzero → Settings → Portfolio Widget</strong> and toggle it on.<br>
              Then make sure your Firestore rules allow public reads:<br><br>
              <code>match /public/{userId} {</code><br>
              <code>&nbsp;&nbsp;allow read: if true;</code><br>
              <code>&nbsp;&nbsp;allow write: if request.auth.uid == userId;</code><br>
              <code>}</code>
            </div>
          </div>`);
          return;
        }
        render(snap.data());
      })
      .catch(e => {
        const isPermission = e.message?.includes("permission") || e.code === "permission-denied";
        show(`<div class="center">
          <div class="icon">${isPermission ? "🛡️" : "⚠️"}</div>
          <div class="title">${isPermission ? "Firestore permission denied" : "Could not load widget"}</div>
          <div class="detail">${e.message || e.code || "Unknown error"}</div>
          ${isPermission ? `<div class="tip">
            Your Firestore security rules are blocking the read.<br>
            Add this rule in <strong style="color:#888">Firebase Console → Firestore → Rules</strong>:<br><br>
            <code>match /public/{userId} {</code><br>
            <code>&nbsp;&nbsp;allow read: if true;</code><br>
            <code>&nbsp;&nbsp;allow write: if request.auth.uid == userId;</code><br>
            <code>}</code>
          </div>` : ""}
        </div>`);
      });
  }

  // ── Chart ────────────────────────────────────────────────────────────────────
  function buildPath(vals) {
    if (!vals || vals.length < 2) return null;
    const W = 460, H = 155, P = 8;
    const min = Math.min(...vals) - 2, max = Math.max(...vals) + 2, range = max - min || 1;
    const x = i => (i / (vals.length - 1)) * W;
    const y = v => P + (1 - (v - min) / range) * (H - P * 2);
    let line = `M ${x(0)} ${y(vals[0])}`;
    for (let i = 1; i < vals.length; i++) {
      const cx = (x(i-1) + x(i)) / 2;
      line += ` C ${cx} ${y(vals[i-1])}, ${cx} ${y(vals[i])}, ${x(i)} ${y(vals[i])}`;
    }
    return { line, area: line + ` L ${x(vals.length-1)} ${H} L ${x(0)} ${H} Z`, x, y, vals, H };
  }

  function drawChart(chartData, days, color, svgId) {
    const pts = days >= 99999 ? chartData : chartData.slice(-days);
    const vals = pts.map(p => parseFloat(p.value));
    const svg = document.getElementById(svgId);
    if (!svg) return;

    const path = buildPath(vals);
    if (!path) {
      svg.innerHTML = `<text x="230" y="87" text-anchor="middle" fill="#333" font-size="11" font-family="monospace">No data for this range</text>`;
      return;
    }

    svg.innerHTML = `
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%" stop-color="${color}" stop-opacity="0.18"/>
          <stop offset="95%" stop-color="${color}" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <path d="${path.area}" fill="url(#wg)"/>
      <path d="${path.line}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle id="hdot" cx="-99" cy="-99" r="4" fill="${color}" stroke="#0d0d0d" stroke-width="2" opacity="0"/>
    `;

    // x-axis labels
    const labelCount = Math.min(5, pts.length);
    for (let i = 0; i < labelCount; i++) {
      const idx = Math.round(i * (pts.length - 1) / (labelCount - 1));
      const lx = path.x(idx), ly = path.H + 12;
      const d = new Date(pts[idx].date);
      const label = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", lx); t.setAttribute("y", ly);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("fill", "#2a2a2a"); t.setAttribute("font-size", "8");
      t.setAttribute("font-family", "monospace"); t.textContent = label;
      svg.appendChild(t);
    }

    // hover tooltip
    const tip = document.getElementById("chart-tip");
    const W = 460;
    svg.addEventListener("mousemove", e => {
      const rect = svg.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width * W;
      const idx = Math.max(0, Math.min(vals.length-1, Math.round(px / W * (vals.length-1))));
      const dot = svg.getElementById ? svg.querySelector("#hdot") : null;
      if (dot) { dot.setAttribute("cx", path.x(idx)); dot.setAttribute("cy", path.y(vals[idx])); dot.setAttribute("opacity", "1"); }
      if (tip) {
        tip.style.display = "block";
        tip.style.left = ((path.x(idx) / W) * rect.width) + "px";
        tip.style.top = ((path.y(vals[idx]) / (path.H + 20)) * rect.height) + "px";
        tip.innerHTML = `<span style="color:#666;font-size:9px">${pts[idx].date}</span><br><span style="color:${color};font-weight:600">${fmt(vals[idx])}</span>`;
      }
    });
    svg.addEventListener("mouseleave", () => {
      const dot = svg.querySelector("#hdot"); if (dot) dot.setAttribute("opacity","0");
      if (tip) tip.style.display = "none";
    });

    // period % change
    const rc = vals.length > 1 ? ((vals[vals.length-1] - vals[0]) / vals[0] * 100) : 0;
    const rcel = document.getElementById("rchange");
    if (rcel) { rcel.textContent = (rc >= 0 ? "+" : "") + fmt(rc) + "% " + (days >= 99999 ? "all-time" : "this period"); rcel.className = "change " + (rc >= 0 ? "pos" : "neg"); }
  }

  // ── Main render ──────────────────────────────────────────────────────────────
  function render(data) {
    const { name, ticker, currency, startPrice, currentPrice, allTime, streak, chartData = [], lastUpdated } = data;
    const isPos = allTime >= 0;
    const color = isPos ? "#22c55e" : "#ef4444";
    const updated = lastUpdated ? new Date(lastUpdated).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—";
    let active = "ALL";

    show(`
      <div class="header">
        <div>
          <div class="name">${name}</div>
          <div class="ticker">$${ticker} · ${currency || "USD"}</div>
        </div>
        <div style="text-align:right">
          <div class="price ${isPos ? "pos" : "neg"}">${fmt(currentPrice || startPrice)}</div>
          <div id="rchange" class="change ${isPos ? "pos" : "neg"}">${isPos ? "+" : ""}${fmt(allTime)}% all-time</div>
        </div>
      </div>

      <div class="ranges">
        <button class="range-btn" data-d="7">1W</button>
        <button class="range-btn" data-d="30">1M</button>
        <button class="range-btn" data-d="90">3M</button>
        <button class="range-btn active" data-d="99999">ALL</button>
      </div>

      <div class="chart-area">
        <div id="chart-tip" class="tooltip"></div>
        <svg id="main-svg" viewBox="0 0 460 170" preserveAspectRatio="none"></svg>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">IPO</div>
          <div class="stat-val" style="color:#888">${fmt(startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Current</div>
          <div class="stat-val ${isPos ? "pos" : "neg"}">${fmt(currentPrice || startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">🔥 Streak</div>
          <div class="stat-val" style="color:#f97316">${streak || 0}d</div>
        </div>
      </div>

      <div class="footer">
        <div class="brand"><span class="dot"></span>entropyzero · ${updated}</div>
        <a class="cta" href="https://entropyzero.vercel.app" target="_blank">View full index →</a>
      </div>
    `);

    drawChart(chartData, 99999, color, "main-svg");

    document.querySelectorAll(".range-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        active = btn.dataset.d;
        document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        drawChart(chartData, parseInt(active), color, "main-svg");
      });
    });
  }
</script>
</body>
</html>
