<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entropyzero widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8e8e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .widget { width: 100%; max-width: 500px; background: #141414; border: 1px solid #2a2a2a; border-radius: 20px; padding: 20px; margin: 16px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .name { font-size: 14px; font-weight: 600; color: #e8e8e8; }
    .ticker { font-family: monospace; font-size: 11px; color: #555; margin-top: 2px; }
    .price { font-size: 22px; font-weight: 700; font-family: monospace; }
    .change { font-size: 11px; font-family: monospace; margin-top: 2px; }
    .pos { color: #22c55e; } .neg { color: #ef4444; }
    .ranges { display: flex; gap: 4px; margin-bottom: 10px; }
    .range-btn { flex: 1; padding: 5px 0; font-size: 10px; font-weight: 600; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #555; cursor: pointer; transition: all 0.15s; font-family: monospace; }
    .range-btn.active { background: #e8e8e8; color: #0d0d0d; border-color: #e8e8e8; }
    .chart-wrap { position: relative; width: 100%; height: 160px; margin-bottom: 14px; }
    .chart-wrap svg { width: 100%; height: 100%; display: block; }
    .tooltip { position: absolute; background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 5px 9px; font-size: 11px; pointer-events: none; display: none; white-space: nowrap; z-index: 10; transform: translate(-50%, -110%); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 10px; text-align: center; }
    .stat-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-size: 13px; font-weight: 600; font-family: monospace; }
    .footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1e1e1e; padding-top: 12px; }
    .brand { font-size: 10px; color: #444; display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .cta { font-size: 10px; color: #555; text-decoration: none; border: 1px solid #2a2a2a; border-radius: 8px; padding: 4px 10px; }
    .cta:hover { color: #e8e8e8; border-color: #444; }
    /* error / loading states */
    .center { text-align: center; padding: 40px 20px; }
    .center .icon { font-size: 28px; margin-bottom: 10px; opacity: 0.4; }
    .center .title { color: #777; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .center .detail { color: #444; font-size: 10px; font-family: monospace; margin-bottom: 10px; }
    .rule-box { background: #0f0f0f; border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px 14px; text-align: left; font-size: 10px; color: #555; line-height: 2; }
    .rule-box .title { color: #666; font-size: 11px; font-weight: 600; margin-bottom: 6px; font-family: sans-serif; }
    .rule-box code { color: #888; font-family: monospace; }
    .rule-green { color: #22c55e; font-family: monospace; }
  </style>
</head>
<body>
<div class="widget" id="app">
  <div class="center"><div class="icon">📈</div><div class="title">Loading…</div></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBuPTw6WpRTWSDhs_L_W9OELFP6ff6Ki0c",
    authDomain: "copiumai-9f5b6.firebaseapp.com",
    projectId: "copiumai-9f5b6",
    storageBucket: "copiumai-9f5b6.firebasestorage.app",
    messagingSenderId: "164793994267",
    appId: "1:164793994267:web:f9d3594cca736c7fa67cbe"
  });
  const db = getFirestore(app);

  const uid = new URLSearchParams(window.location.search).get("uid");
  const root = document.getElementById("app");
  const fmt = (n, d=2) => Number(parseFloat(n)).toFixed(d);

  function setHtml(html) { root.innerHTML = html; }

  function showError(icon, title, detail, showRules) {
    setHtml(`
      <div class="center">
        <div class="icon">${icon}</div>
        <div class="title">${title}</div>
        <div class="detail">${detail}</div>
        ${showRules ? `
        <div class="rule-box">
          <div class="title">Fix: add this rule in Firebase Console → Firestore → Rules → Publish</div>
          <code>match /public/{userId} {</code><br>
          <code class="rule-green">&nbsp;&nbsp;allow read: if true;</code><br>
          <code>&nbsp;&nbsp;allow write: if request.auth.uid == userId;</code><br>
          <code>}</code>
        </div>` : ""}
      </div>
    `);
  }

  if (!uid) {
    showError("🔗", "No user ID", "Add ?uid=YOUR_USER_ID to this URL", false);
  } else {
    getDoc(doc(db, "public", uid))
      .then(snap => {
        if (!snap.exists()) {
          showError("🔒", "Widget not enabled",
            "Go to entropyzero → Settings → Portfolio Widget and toggle it on.", true);
          return;
        }
        const data = snap.data();
        // Normalise chartData — Firestore can store arrays, handle both formats
        let cd = data.chartData || [];
        if (!Array.isArray(cd)) cd = [];
        // Filter to only entries with date and numeric value
        cd = cd
          .filter(p => p && p.date && !isNaN(parseFloat(p.value)))
          .map(p => ({ date: String(p.date), value: parseFloat(p.value) }))
          .sort((a, b) => a.date.localeCompare(b.date));

        if (cd.length === 0) {
          showError("📉", "No chart data found",
            "Toggle widget off and on in Settings to force a resync.", false);
          return;
        }
        render(data, cd);
      })
      .catch(e => {
        const isPerm = e.code === "permission-denied" || (e.message||"").toLowerCase().includes("permission");
        showError(
          isPerm ? "🛡️" : "⚠️",
          isPerm ? "Firestore permission denied" : "Could not load widget",
          isPerm ? "Your Firestore security rules are blocking this read." : (e.message || "Unknown error"),
          isPerm
        );
      });
  }

  // ── SVG chart ────────────────────────────────────────────────────────────────
  const VW = 460, VH = 140, PAD = 6;

  function buildPath(vals) {
    if (!vals || vals.length < 2) return null;
    const mn = Math.min(...vals) - 1, mx = Math.max(...vals) + 1, rng = mx - mn || 1;
    const x = i => (i / (vals.length - 1)) * VW;
    const y = v => PAD + (1 - (v - mn) / rng) * (VH - PAD * 2);
    // monotone cubic bezier
    let d = `M ${x(0).toFixed(1)} ${y(vals[0]).toFixed(1)}`;
    for (let i = 1; i < vals.length; i++) {
      const mx1 = (x(i-1) + x(i)) / 2;
      d += ` C ${mx1.toFixed(1)} ${y(vals[i-1]).toFixed(1)}, ${mx1.toFixed(1)} ${y(vals[i]).toFixed(1)}, ${x(i).toFixed(1)} ${y(vals[i]).toFixed(1)}`;
    }
    return { d, area: d + ` L ${x(vals.length-1).toFixed(1)} ${VH} L 0 ${VH} Z`, x, y };
  }

  function drawChart(cd, days, color) {
    const pts = days >= 99999 ? cd : cd.slice(-days);
    const vals = pts.map(p => p.value);
    const svgEl = document.getElementById("wchart");
    const tipEl = document.getElementById("wtip");
    if (!svgEl) return;

    const path = buildPath(vals);
    if (!path || vals.length < 2) {
      svgEl.innerHTML = `<text x="230" y="75" text-anchor="middle" fill="#333" font-size="11" font-family="monospace">Not enough data for this range</text>`;
      return;
    }

    svgEl.innerHTML = `
      <defs>
        <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.20"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <path d="${path.area}" fill="url(#wgrad)"/>
      <path d="${path.d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle id="wdot" cx="-9999" cy="-9999" r="4" fill="${color}" stroke="#141414" stroke-width="2" opacity="0"/>
    `;

    // x-axis date labels
    const n = Math.min(4, pts.length);
    for (let i = 0; i < n; i++) {
      const idx = Math.round(i * (pts.length - 1) / (n - 1));
      const lbl = new Date(pts[idx].date + "T00:00:00")
        .toLocaleDateString("en-US", { month: "short", day: "numeric" });
      const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
      t.setAttribute("x", path.x(idx)); t.setAttribute("y", VH + 14);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("fill", "#333"); t.setAttribute("font-size", "8");
      t.setAttribute("font-family", "monospace"); t.textContent = lbl;
      svgEl.appendChild(t);
    }

    // hover
    svgEl.onmousemove = e => {
      const rect = svgEl.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width * VW;
      const idx = Math.max(0, Math.min(vals.length - 1, Math.round(px / VW * (vals.length - 1))));
      const dot = svgEl.querySelector("#wdot");
      if (dot) { dot.setAttribute("cx", path.x(idx)); dot.setAttribute("cy", path.y(vals[idx])); dot.setAttribute("opacity", "1"); }
      if (tipEl) {
        tipEl.style.display = "block";
        tipEl.style.left = ((path.x(idx) / VW) * rect.width) + "px";
        tipEl.style.top = ((path.y(vals[idx]) / VH) * rect.height) + "px";
        tipEl.innerHTML = `<span style="color:#555;font-size:9px">${pts[idx].date}</span><br><b style="color:${color}">${fmt(vals[idx])}</b>`;
      }
    };
    svgEl.onmouseleave = () => {
      const dot = svgEl.querySelector("#wdot"); if (dot) dot.setAttribute("opacity", "0");
      if (tipEl) tipEl.style.display = "none";
    };

    // period change
    const pct = ((vals[vals.length-1] - vals[0]) / vals[0]) * 100;
    const rcel = document.getElementById("wchange");
    if (rcel) {
      rcel.textContent = (pct >= 0 ? "+" : "") + fmt(pct) + "% " + (days >= 99999 ? "all-time" : "this period");
      rcel.className = "change " + (pct >= 0 ? "pos" : "neg");
    }
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function render(data, cd) {
    const { name, ticker, currency, startPrice, currentPrice, allTime, streak, lastUpdated } = data;
    const isPos = (allTime ?? 0) >= 0;
    const color = isPos ? "#22c55e" : "#ef4444";
    const updated = lastUpdated
      ? new Date(lastUpdated).toLocaleDateString("en-US", { month: "short", day: "numeric" })
      : "—";

    setHtml(`
      <div class="header">
        <div>
          <div class="name">${name || "—"}</div>
          <div class="ticker">$${ticker || "???"} · ${currency || "USD"}</div>
        </div>
        <div style="text-align:right">
          <div class="price ${isPos ? "pos" : "neg"}">${fmt(currentPrice ?? startPrice)}</div>
          <div id="wchange" class="change ${isPos ? "pos" : "neg"}">${isPos ? "+" : ""}${fmt(allTime)}% all-time</div>
        </div>
      </div>

      <div class="ranges">
        <button class="range-btn" data-d="7">1W</button>
        <button class="range-btn" data-d="30">1M</button>
        <button class="range-btn" data-d="90">3M</button>
        <button class="range-btn active" data-d="99999">ALL</button>
      </div>

      <div class="chart-wrap">
        <div id="wtip" class="tooltip"></div>
        <svg id="wchart" viewBox="0 0 ${VW} ${VH + 18}" preserveAspectRatio="none"></svg>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">IPO</div>
          <div class="stat-val" style="color:#888">${fmt(startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Current</div>
          <div class="stat-val ${isPos ? "pos" : "neg"}">${fmt(currentPrice ?? startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">🔥 Streak</div>
          <div class="stat-val" style="color:#f97316">${streak || 0}d</div>
        </div>
      </div>

      <div class="footer">
        <div class="brand"><span class="dot"></span>entropyzero · ${updated}</div>
        <a class="cta" href="https://entropyzero.vercel.app" target="_blank">View full index →</a>
      </div>
    `);

    drawChart(cd, 99999, color);

    document.querySelectorAll(".range-btn").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        drawChart(cd, parseInt(btn.dataset.d), color);
      };
    });
  }
</script>
</body>
</html>
