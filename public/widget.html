<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entropyzero widget</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e8e8e8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .widget { width: 100%; max-width: 500px; background: #141414; border: 1px solid #2a2a2a; border-radius: 20px; padding: 20px; margin: 16px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .name { font-size: 14px; font-weight: 600; color: #e8e8e8; }
    .ticker { font-family: monospace; font-size: 11px; color: #555; margin-top: 2px; }
    .price { font-size: 22px; font-weight: 700; font-family: monospace; }
    .change { font-size: 11px; font-family: monospace; margin-top: 2px; }
    .pos { color: #22c55e; } .neg { color: #ef4444; }
    .ranges { display: flex; gap: 4px; margin-bottom: 10px; }
    .range-btn { flex: 1; padding: 5px 0; font-size: 10px; font-weight: 600; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #555; cursor: pointer; transition: all 0.15s; font-family: monospace; }
    .range-btn:hover { color: #aaa; border-color: #444; }
    .range-btn.active { background: #e8e8e8; color: #0d0d0d; border-color: #e8e8e8; }
    .chart-area { width: 100%; height: 180px; margin-bottom: 14px; }
    .chart-area svg { width: 100%; height: 100%; display: block; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: #1a1a1a; border: 1px solid #252525; border-radius: 12px; padding: 10px; text-align: center; }
    .stat-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .stat-val { font-size: 13px; font-weight: 600; font-family: monospace; }
    .footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1e1e1e; padding-top: 12px; }
    .brand { font-size: 10px; color: #444; display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .cta { font-size: 10px; color: #555; text-decoration: none; border: 1px solid #2a2a2a; border-radius: 8px; padding: 4px 10px; transition: all 0.2s; }
    .cta:hover { color: #e8e8e8; border-color: #444; }
    .center { text-align: center; padding: 48px; color: #444; font-size: 13px; line-height: 2; }
    .tooltip {
      position: absolute; background: #1e1e1e; border: 1px solid #2e2e2e;
      border-radius: 8px; padding: 6px 10px; font-size: 11px; pointer-events: none;
      display: none; white-space: nowrap; z-index: 10;
    }
    .chart-wrap { position: relative; }
  </style>
</head>
<body>
<div class="widget" id="app">
  <div class="center">
    <div style="font-size:28px;margin-bottom:8px;opacity:0.4">📈</div>
    Loading…
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const db = getFirestore(initializeApp({
    apiKey: "AIzaSyBuPTw6WpRTWSDhs_L_W9OELFP6ff6Ki0c",
    authDomain: "copiumai-9f5b6.firebaseapp.com",
    projectId: "copiumai-9f5b6",
    storageBucket: "copiumai-9f5b6.firebasestorage.app",
    messagingSenderId: "164793994267",
    appId: "1:164793994267:web:f9d3594cca736c7fa67cbe"
  }));

  const uid = new URLSearchParams(window.location.search).get("uid");
  const fmt = (n, d=2) => parseFloat(n).toFixed(d);
  const app = document.getElementById("app");

  function err(msg) {
    app.innerHTML = `<div class="center">${msg}</div>`;
  }

  if (!uid) return err("No user ID.<br><small style='color:#333'>Add ?uid=YOUR_ID to the URL</small>");

  getDoc(doc(db, "public", uid))
    .then(snap => {
      if (!snap.exists()) return err("Widget not enabled.<br><small style='color:#333'>Settings → Portfolio Widget → toggle on</small>");
      render(snap.data());
    })
    .catch(e => err("Failed to load: " + e.message));

  // ── SVG chart — same curve style as Recharts monotone ─────────────────────
  function buildSVG(pts, color) {
    if (!pts || pts.length < 2) return `<text x="50%" y="50%" text-anchor="middle" fill="#333" font-size="11" dominant-baseline="middle">No data</text>`;
    const W = 460, H = 150, PX = 0, PY = 12;
    const vals = pts.map(p => parseFloat(p.value));
    const min = Math.min(...vals) - 5;
    const max = Math.max(...vals) + 5;
    const range = max - min || 1;
    const x = i => PX + (i / (pts.length - 1)) * (W - PX * 2);
    const y = v => PY + (1 - (v - min) / range) * (H - PY * 2);

    // monotone cubic like recharts
    let d = `M ${x(0)} ${y(vals[0])}`;
    for (let i = 1; i < vals.length; i++) {
      const x0 = x(i-1), y0 = y(vals[i-1]), x1 = x(i), y1 = y(vals[i]);
      const cpx = (x0 + x1) / 2;
      d += ` C ${cpx} ${y0}, ${cpx} ${y1}, ${x1} ${y1}`;
    }
    const area = d + ` L ${x(vals.length-1)} ${H} L ${x(0)} ${H} Z`;

    // x-axis labels (pick ~4 evenly spaced)
    const labelCount = Math.min(4, pts.length);
    const labelIdxs = Array.from({length: labelCount}, (_, i) => Math.round(i * (pts.length - 1) / (labelCount - 1)));
    const labels = labelIdxs.map(i => {
      const d = new Date(pts[i].date);
      const label = d.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
      return `<text x="${x(i)}" y="${H + 14}" text-anchor="middle" fill="#2a2a2a" font-size="9">${label}</text>`;
    }).join("");

    return `
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%" stop-color="${color}" stop-opacity="0.18"/>
          <stop offset="95%" stop-color="${color}" stop-opacity="0.01"/>
        </linearGradient>
        <clipPath id="clip"><rect x="0" y="0" width="${W}" height="${H}"/></clipPath>
      </defs>
      <g clip-path="url(#clip)">
        <path d="${area}" fill="url(#wg)"/>
        <path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      ${labels}
    `;
  }

  // ── Tooltip on hover ───────────────────────────────────────────────────────
  function attachTooltip(svgEl, pts, color) {
    if (!pts || pts.length < 2) return;
    const W = 460, H = 150, PY = 12;
    const vals = pts.map(p => parseFloat(p.value));
    const min = Math.min(...vals) - 5, max = Math.max(...vals) + 5, range = max - min || 1;
    const x = i => (i / (pts.length - 1)) * W;
    const y = v => PY + (1 - (v - min) / range) * (H - PY * 2);

    const tip = document.getElementById("tip");
    const dot = document.getElementById("hover-dot");

    svgEl.addEventListener("mousemove", e => {
      const rect = svgEl.getBoundingClientRect();
      const px = (e.clientX - rect.left) / rect.width * W;
      const idx = Math.max(0, Math.min(pts.length - 1, Math.round(px / W * (pts.length - 1))));
      const val = vals[idx];
      const sx = x(idx), sy = y(val);

      dot.setAttribute("cx", sx); dot.setAttribute("cy", sy);
      dot.setAttribute("fill", color); dot.style.display = "block";

      tip.style.display = "block";
      tip.innerHTML = `<span style="color:#666;font-size:10px">${pts[idx].date}</span><br><span style="color:${color};font-family:monospace;font-weight:600">${fmt(val)}</span>`;
      const tx = (sx / W) * rect.width + rect.left - document.getElementById("app").getBoundingClientRect().left;
      tip.style.left = Math.min(tx, rect.width - 120) + "px";
      tip.style.top = (sy / H) * rect.height + "px";
    });
    svgEl.addEventListener("mouseleave", () => { tip.style.display = "none"; dot.style.display = "none"; });
  }

  // ── Main render ───────────────────────────────────────────────────────────
  function render(data) {
    const { name, ticker, currency, startPrice, currentPrice, allTime, streak, chartData = [], lastUpdated } = data;
    const updated = lastUpdated ? new Date(lastUpdated).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—";
    let activeRange = "ALL";
    const RANGES = { "1W": 7, "1M": 30, "3M": 90, "ALL": 99999 };

    function getFiltered(range) {
      const days = RANGES[range];
      if (days >= 99999) return chartData;
      const cutoff = Date.now() - days * 86400000;
      const f = chartData.filter(d => new Date(d.date).getTime() >= cutoff);
      return f.length > 1 ? f : chartData.slice(-days);
    }

    function drawAll(range) {
      const pts = getFiltered(range);
      const isProfit = pts.length > 1 ? pts[pts.length-1].value >= pts[0].value : allTime >= 0;
      const color = isProfit ? "#22c55e" : "#ef4444";
      const rc = pts.length > 1 ? ((pts[pts.length-1].value - pts[0].value) / pts[0].value * 100) : allTime;

      // Update price/change
      document.getElementById("w-price").textContent = fmt(currentPrice || startPrice);
      document.getElementById("w-price").className = "price " + (isProfit ? "pos" : "neg");
      document.getElementById("w-change").textContent = (rc >= 0 ? "+" : "") + fmt(rc) + "% " + (range === "ALL" ? "all-time" : "this period");
      document.getElementById("w-change").className = "change " + (isProfit ? "pos" : "neg");

      // Update chart
      const svgEl = document.getElementById("main-svg");
      svgEl.innerHTML = buildSVG(pts, color);
      // Re-add hover dot element
      const dotEl = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dotEl.setAttribute("id", "hover-dot");
      dotEl.setAttribute("r", "4");
      dotEl.setAttribute("stroke", "#080808");
      dotEl.setAttribute("stroke-width", "2");
      dotEl.style.display = "none";
      svgEl.appendChild(dotEl);
      attachTooltip(svgEl, pts, color);

      // Update range buttons
      document.querySelectorAll(".range-btn").forEach(b => {
        b.classList.toggle("active", b.dataset.r === range);
      });
    }

    app.innerHTML = `
      <div class="header">
        <div>
          <div class="name">${name}</div>
          <div class="ticker">$${ticker} · ${currency || "USD"}</div>
        </div>
        <div style="text-align:right">
          <div id="w-price" class="price pos">${fmt(currentPrice || startPrice)}</div>
          <div id="w-change" class="change pos">+${fmt(allTime)}% all-time</div>
        </div>
      </div>

      <div class="ranges">
        <button class="range-btn" data-r="1W">1W</button>
        <button class="range-btn" data-r="1M">1M</button>
        <button class="range-btn" data-r="3M">3M</button>
        <button class="range-btn active" data-r="ALL">ALL</button>
      </div>

      <div class="chart-wrap">
        <div id="tip" class="tooltip"></div>
        <div class="chart-area">
          <svg id="main-svg" viewBox="0 0 460 165" preserveAspectRatio="none"></svg>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">IPO</div>
          <div class="stat-val" style="color:#888">${fmt(startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Current</div>
          <div class="stat-val ${allTime >= 0 ? "pos" : "neg"}">${fmt(currentPrice || startPrice)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">🔥 Streak</div>
          <div class="stat-val" style="color:#f97316">${streak || 0}d</div>
        </div>
      </div>

      <div class="footer">
        <div class="brand"><span class="dot"></span>entropyzero · ${updated}</div>
        <a class="cta" href="https://entropyzero.vercel.app" target="_blank">View full index →</a>
      </div>
    `;

    drawAll(activeRange);

    document.querySelectorAll(".range-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        activeRange = btn.dataset.r;
        drawAll(activeRange);
      });
    });
  }
</script>
</body>
</html>
